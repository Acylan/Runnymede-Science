<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clubs — Runnymede</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./clubs.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="logo-watermark"><img src="./assets/Runnymede%20Logo.png" alt="" /></div>

    <div class="relative z-10 w-full max-w-5xl mx-auto px-4 pb-24">

        <!-- Top nav -->
        <div class="flex items-center justify-between pt-6">
            <a href="./index.html" class="inline-flex items-center gap-2 text-blue-200/80 hover:text-white text-sm font-semibold transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                Back to Blog
            </a>
            <img src="./assets/Runnymede%20Logo.png" alt="Runnymede" class="w-10 h-10 object-contain opacity-90" />
        </div>

        <!-- Header -->
        <header class="text-center pt-8 pb-10 fade-up">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-blue-400/20 text-blue-200/80 text-xs font-semibold tracking-wide mb-4">
                <span class="w-2 h-2 rounded-full bg-blue-400 animate-pulse"></span> RUNNYMEDE
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight drop-shadow-lg">
                Student <span class="bg-gradient-to-r from-sky-300 via-blue-300 to-indigo-300 bg-clip-text text-transparent">Clubs</span>
            </h1>
            <p class="text-blue-200/80 text-lg mt-3 max-w-xl mx-auto">
                Pick a club to explore. New ones are added here as they launch.
            </p>
        </header>

        <!-- Clubs grid -->
        <section id="clubs-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6"></section>
    </div>

    <script>
    /* ============================================================
       The list of clubs. To add a club, add an entry here and create
       its page (set `href` and `status: 'live'`). Leave `href` out and
       use `status: 'soon'` to show a "coming soon" placeholder.
       ============================================================ */
    const CLUBS = [
        {
            name: "STEM Club", emoji: "🔬", href: "./stem.html", status: "live",
            tag: "An interactive lab of 16 hands-on Science, Tech, Engineering & Maths experiments.",
            accent: "#38bdf8", soft: "rgba(56,189,248,.22)"
        },
        {
            name: "CanSat", emoji: "🛰️", href: "./cansat.html", status: "live",
            tag: "Design, build and launch a soda-can-sized satellite that runs a real mission on its way down.",
            accent: "#fb7185", soft: "rgba(251,113,133,.20)"
        },
        {
            name: "Robotics", emoji: "🤖", status: "soon",
            tag: "Build and program robots to take on challenges and mini-competitions.",
            accent: "#fbbf24", soft: "rgba(251,191,36,.18)"
        },
        {
            name: "Astronomy", emoji: "🔭", status: "soon",
            tag: "Observation evenings, the night sky and the science of space.",
            accent: "#a78bfa", soft: "rgba(167,139,250,.18)"
        }
    ];

    const grid = document.getElementById('clubs-grid');
    const ARROW = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M4 12h16m-7-7 7 7-7 7"/></svg>`;

    CLUBS.forEach((c, i) => {
        const live = c.status === 'live';
        const el = document.createElement(live ? 'a' : 'div');
        el.className = 'club-card fade-up' + (live ? '' : ' soon');
        el.style.setProperty('--accent', c.accent);
        el.style.setProperty('--soft', c.soft);
        el.style.animationDelay = (i * 0.08) + 's';
        if (live) el.href = c.href;
        el.innerHTML = `
            <span class="club-status chip" ${live ? `style="background:${c.soft};border-color:${c.accent};color:#fff"` : ''}>
                ${live ? 'Open' : 'Coming soon'}
            </span>
            <div class="club-icon">${c.emoji}</div>
            <h2 class="text-2xl font-extrabold">${c.name}</h2>
            <p class="text-blue-200/75 text-sm mt-1.5 leading-relaxed">${c.tag}</p>
            ${live ? `<span class="club-cta">Enter club ${ARROW}</span>` : `<span class="club-cta" style="color:rgba(191,219,254,.5)">In the works</span>`}`;
        grid.appendChild(el);
    });
    </script>
</body>
</html>
